global:
  security:
    allowInsecureImages: true
apps:
  api:
    service:
      portName: http-python
      port: 8000
      targetPort: 8000
      nodePort: 30800
    deploy:
      replicas: 1
      image: olomg48/api:1.1
      containerPort: 8000
      env:
        INFERENCE_URL: "http://inference-srv:8000"
      secretEnv:
        DB_CONN:
          secretName: connection-string
          secretKey: string
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
  inference:
    service:
      portName: http-python
      port: 8000
      targetPort: 8000
      nodePort: 30801
    deploy:
      replicas: 1
      image: olomg48/inference:1.0
      containerPort: 8000
      env:
        MLFLOW_TRACKING_URI: "http://mlflow-srv:5000"
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
        limits:
          memory: "1024Mi"
          cpu: "500m"
  front:
    service:
      portName: http-dotnet
      port: 8080
      targetPort: 8080
      nodePort: 30880
    deploy:
      replicas: 1
      image: olomg48/front:84b96ac24f53ed50287c5a8ae09b03ce3dfebaca
      containerPort: 8080
      env:
        ApiBaseUrl: "http://api-srv:8000/api"
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
  mlflow:
    service:
      portName: http-mlflow
      port: 5000
      targetPort: 5000
      nodePort: 30500
    deploy:
      replicas: 1
      image: olomg48/mlflow:1.0
      containerPort: 5000
      env:
        MLFLOW_S3_ENDPOINT_URL: "s3://mlflow-bucket-olomg-504110891367-eu-north-1-an/mlflow-bucket/"
        MLFLOW_S3_IGNORE_CONFIG_FILE: "true"
        MLFLOW_PORT: "5000"
      secretEnv:
        AWS_ACCESS_KEY_ID:
          secretName: minio-user
          secretKey: user
        AWS_SECRET_ACCESS_KEY:
          secretName: minio-pass
          secretKey: pass
      args:
        - "--host"
        - "0.0.0.0"
        - "--serve-artifacts"
        - "--allowed-hosts"
        - "*" # to do edytowania na killercoda
        - "--artifacts-destination"
        - "s3://mlflow-bucket/"
        - "--static-prefix"
        -  "/mlflow"
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
        limits:
          memory: "2048Mi"
          cpu: "1000m"


ingress:
  default-ingress:
    enabled: true
    className: "nginx"
    annotations:
      kubernetes.io/ingress.class: nginx
    hosts:
      - host: 
        paths:
          - path: /
            pathType: Prefix
            serviceName: front-srv
            servicePort: 8080

          - path: /api
            pathType: Prefix
            serviceName: api-srv
            servicePort: 8000
          
          - path: /minio
            pathType: Prefix
            serviceName: app-helm-minio-console
            servicePort: 9001

          - path: /inference
            pathType: Prefix
            serviceName: inference-srv
            servicePort: 8000

  mlflow-ingress:
    enabled: true
    className: "nginx"
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/rewrite-target: /$1
      nginx.ingress.kubernetes.io/use-regex: "true"
    hosts:
      - host: 
        paths:
          - path: /mlflow/(.*)
            pathType: ImplementationSpecific
            serviceName: mlflow-srv
            servicePort: 5000

ingress-nginx:
  enabled: true
  controller:
    replicaCount: 1