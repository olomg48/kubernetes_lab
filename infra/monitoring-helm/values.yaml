prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 2h      
    storageSpec: {}        
    resources:             
      requests:
        memory: "400Mi"
      limits:
        memory: "800Mi"
grafana:
  enabled: true
  adminPassword: "admin" 
  service:
    type: ClusterIP 
  sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    searchNamespace: ALL 
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://{{ .Release.Name }}-loki:3100
      access: proxy
      isDefault: false


alertmanager:
  enabled: false
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
kubeProxy:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false


ingress:
  default-ingress:
    enabled: true
    className: "nginx"
    annotations:
      kubernetes.io/ingress.class: nginx
    hosts: 
      - host: monitoring-olomg.pl
        paths:
          - path: /
            pathType: Prefix
            serviceName: monitoring-grafana
            servicePort: 80
      - host: prometheus-olomg.pl
        paths:
          - path: /
            pathType: Prefix
            serviceName: prometheus-operated
            servicePort: 9090
      - host: alertmanager-olomg.pl
        paths:
          - path: /
            pathType: Prefix
            serviceName: alertmanager-operated
            servicePort: 9093
ingress-nginx:
  enabled: true
  controller:
    replicaCount: 1

loki-stack:
  loki:
    enabled: true
    persistence:
      enabled: false
  promtail:
    enabled: true
    config:
      clients:
        - url: http://{{ .Release.Name }}-loki:3100/loki/api/v1/push
